name: CI

on:
  push:
    branches: [main, dev, mikael-clean]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  test:
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest -v