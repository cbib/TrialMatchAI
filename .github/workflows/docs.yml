name: Docs

# Build the MkDocs site (strict) on every push/PR; deploy to GitHub Pages on main
# via the official GitHub Actions Pages deployment (not a gh-pages branch push).
on:
  push:
    branches: [main, deployment-readiness-audit]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

# Serialize Pages deployments; let an in-progress publish finish rather than
# cancelling it, so a deploy is never interrupted mid-write.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write # configure-pages flips the Pages source to "GitHub Actions"
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Configure GitHub Pages (enable + set source to Actions)
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Build docs (strict)
        run: uv run --group docs mkdocs build --strict
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    # PRs and other branches only build (validate) above; main publishes.
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write # deploy to Pages
      id-token: write # OIDC token for actions/deploy-pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
