[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "TrialMatchAI"
version = "0.1.0"
description = "AI-driven clinical trial matching pipeline."
readme = "README.md"
requires-python = ">=3.11,<3.12"
license = "MIT"
license-files = ["LICENSE"]
dependencies = [
  # Core ML / NLP
  "torch==2.11.0",
  "transformers==5.6.2",
  "accelerate==1.8.1",
  "tokenizers==0.22.1",
  "safetensors>=0.6.2,<0.7",
  "sentencepiece==0.2.1",
  "elasticsearch==8.17.2",
  "faiss-cpu==1.9.0.post1",
  "peft==0.15.2",
  "einops==0.8.0",
  "tiktoken==0.8.0",
  # Classical stack & utilities
  "numpy>=2.0,<3",
  "scipy==1.15.1",
  "scikit-learn==1.6.1",
  "pandas==2.2.3",
  "python-dateutil==2.9.0.post0",
  "requests==2.34.2",
  "tenacity==9.0.0",
  "joblib==1.4.2",
  "tqdm==4.67.1",
  "regex>=2025.10.22,<2027",
  "orjson==3.11.9",
  "PyYAML==6.0.2",
  "python-dotenv==1.2.2",
  "rich==13.9.4",
  # spaCy / medspaCy (for your medical text work)
  "spacy==3.7.5",
  "medspacy==1.3.1",
  "medspacy_quickumls==3.2",
  "PyRuSH==1.0.9",
  "PyFastNER==1.0.10",
  "pysbd==0.3.4",
  "quicksectx==0.4.0",
  "gliner==0.2.27",
  # App / infra
  "SQLAlchemy==2.0.37",
  "pydantic>=2.12.0,<3",
  "pydantic-settings>=2.10.1,<3",
  "huggingface_hub>=1.5.0,<2",
  "bioregistry==0.13.62",
  "rapidfuzz==3.14.5",
  "nltk==3.9.4",
]

[project.optional-dependencies]
gpu = [
  "bitsandbytes==0.49.2; sys_platform == 'linux' or sys_platform == 'win32'",
  "vllm==0.23.0; sys_platform == 'linux'",
]
llm = [
  "openai>=2.26.0,<3",
  "httpx==0.28.1",
  "langchain==1.3.10",
  "langchain-community==0.4.2",
  "langchain-openai==1.3.2",
]
training = [
  "datasets==2.19.0",
  "bert-score==0.3.13",
  "jinja2==3.1.6",
]

[project.scripts]
trialmatchai-healthcheck = "Matcher.cli.healthcheck:main"
trialmatchai-run = "Matcher.cli.run:main"
trialmatchai-bootstrap-data = "Matcher.cli.bootstrap_data:main"
trialmatchai-index = "Matcher.cli.index_data:main"

[dependency-groups]
dev = [
  "pytest>=8.3",
  "ruff>=0.9.0",
  "pip-audit>=2.7.3",
]

[tool.setuptools]
package-dir = {"" = "source"}
include-package-data = true

[tool.setuptools.packages.find]
where = ["source"]

[tool.setuptools.package-data]
Matcher = ["config/*.json"]
Parser = ["bin/*", "include/*", "lib/*", "normalizers/*.md"]

[tool.uv]
environments = [
  "sys_platform == 'darwin'",
  "sys_platform == 'linux' and platform_machine == 'x86_64'",
]
