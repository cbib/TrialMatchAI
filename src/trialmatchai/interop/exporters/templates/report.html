<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TrialMatchAI — Match Report</title>
<style>
  :root {
    --ink: #1a1a1a; --muted: #5a5a5a; --faint: #8a8a8a;
    --rule: #e2e2e2; --fill: #f6f7f8; --accent: #0072b2; --bg: #ffffff;
    --good: #009e73; --bad: #d55e00; --warn: #e69f00; --neutral: #9a9a9a;
    --good-bg: #e0f2ec; --good-tx: #00795a;
    --bad-bg: #fbe9dd;  --bad-tx: #a84a00;
    --warn-bg: #fbf0d8; --warn-tx: #8a6200;
    --neu-bg: #efefef;  --neu-tx: #5a5a5a;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 16px; line-height: 1.55;
  }
  a { color: var(--accent); }

  /* ---- two-column shell ---- */
  .report { display: grid; grid-template-columns: 300px minmax(0, 720px); gap: 32px;
            max-width: 1080px; margin-inline: auto; padding: 24px; align-items: start; }
  .sidebar { position: sticky; top: 24px; align-self: start; max-height: calc(100vh - 48px); overflow-y: auto; }
  .brand-logo { height: 30px; width: auto; display: block; margin-bottom: 16px; }

  /* ---- patient context card ---- */
  .pcard { border: 1px solid var(--rule); border-radius: 12px; background: var(--bg); padding: 20px; }
  .pcard .pid { font: 600 17px/1.3 var(--ink); }
  .pcard .pdem { color: var(--muted); font-size: 13.5px; margin-top: 2px; font-variant-numeric: tabular-nums; }
  .pcard h2 { font: 600 11px/1 var(--mono); letter-spacing: .1em; text-transform: uppercase; color: var(--faint); margin: 18px 0 8px; }
  .pcard .narrative { font-size: 14px; color: #333; margin: 0; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { font-size: 12.5px; background: var(--fill); border: 1px solid var(--rule); color: #333; border-radius: 999px; padding: 2px 10px; }

  /* ---- main column ---- */
  .main-head h1 { margin: 2px 0 0; font-size: 20px; }
  .toolbar { position: sticky; top: 0; background: var(--bg); border-bottom: 1px solid var(--rule);
             display: flex; flex-direction: column; gap: 8px; padding: 12px 0; z-index: 5; margin-top: 14px; }
  .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .search { display: flex; align-items: center; flex: 1 1 220px; min-width: 170px; border: 1px solid var(--rule); border-radius: 8px; padding: 0 4px 0 10px; }
  .search .mag { color: var(--faint); font-size: 15px; }
  .search input { border: 0; outline: 0; flex: 1; font-size: 14px; padding: 8px; background: transparent; color: var(--ink); }
  .toolbar select { font-size: 13px; padding: 7px 9px; border: 1px solid var(--rule); border-radius: 8px; background: var(--bg); color: #333; }
  .seg { display: inline-flex; border: 1px solid var(--rule); border-radius: 8px; overflow: hidden; margin-left: auto; }
  .seg button { border: 0; background: var(--bg); font-size: 13px; padding: 7px 12px; cursor: pointer; color: var(--muted); }
  .seg button.on { background: var(--fill); color: var(--ink); font-weight: 600; }
  .seg button + button { border-left: 1px solid var(--rule); }
  .ghost { border: 1px solid var(--rule); background: var(--bg); border-radius: 8px; font-size: 13px; padding: 7px 11px; cursor: pointer; color: var(--muted); }
  .ghost:hover { background: var(--fill); }
  .statusline { display: flex; align-items: center; gap: 12px; font-size: 12.5px; color: var(--muted); }
  .statusline .count { font-variant-numeric: tabular-nums; }
  .linkbtn { border: 0; background: 0; color: var(--accent); font-size: 12.5px; cursor: pointer; padding: 0; }
  @media (max-width: 720px) { .search { flex-basis: 100%; } }

  /* ---- trial card ---- */
  details.trial { border-bottom: 1px solid var(--rule); }
  details.trial > summary { list-style: none; cursor: pointer; display: grid;
            grid-template-columns: 30px 1fr auto; gap: 14px; align-items: start; padding: 16px 4px; }
  details.trial > summary::-webkit-details-marker { display: none; }
  details.trial > summary:hover { background: var(--fill); }
  summary:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .rank { font: 400 13px/1.5 var(--mono); color: var(--faint); text-align: right; font-variant-numeric: tabular-nums; }
  .identity { min-width: 0; }
  .t-title { margin: 0; font-size: 16.5px; font-weight: 600; color: var(--ink);
             white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .t-sub { color: var(--muted); font-size: 13px; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .t-sub .mono { font-family: var(--mono); }
  .t-sub .dot { color: var(--faint); padding: 0 6px; }

  .rail { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  .statuspill { font: 600 11px/1 var(--mono); border-radius: 999px; padding: 3px 9px; white-space: nowrap; border: 1px solid transparent; }
  .st-good { color: var(--good-tx); background: var(--good-bg); border-color: #bfe3d6; }
  .st-warn { color: var(--warn-tx); background: var(--warn-bg); border-color: #eddcae; }
  .st-neutral { color: var(--neu-tx); background: var(--neu-bg); border-color: #ddd; }
  .verdict { font-size: 12px; font-weight: 600; border-radius: 6px; padding: 3px 10px; color: #fff; white-space: nowrap; }
  .v-eligible { background: var(--good); }
  .v-likely-eligible { background: #4bb38f; }
  .v-likely-ineligible { background: var(--warn); }
  .v-ineligible { background: var(--bad); }
  .v-unknown { background: var(--neutral); }

  /* ---- expanded body ---- */
  .body { padding: 0 4px 22px 44px; }
  .recap { background: var(--fill); border-left: 3px solid var(--accent); padding: 8px 12px; margin: 0 0 8px; max-width: 66ch; }
  .metrics { color: var(--muted); font-size: 13px; font-variant-numeric: tabular-nums; margin-bottom: 16px; }
  .facts { margin-bottom: 24px; }
  .summary-txt { max-width: 66ch; color: #333; margin: 0 0 10px; }
  .kv { display: grid; grid-template-columns: 110px 1fr; gap: 8px; font-size: 13.5px; margin: 4px 0; }
  .kv b { color: var(--muted); font-weight: 600; }
  .kv span { color: #333; }
  .crit-h { font: 600 11.5px/1 var(--mono); letter-spacing: .1em; text-transform: uppercase; color: var(--faint); margin: 0 0 8px; }
  .critgroup + .critgroup { margin-top: 20px; }
  .crit { display: grid; grid-template-columns: 104px 1fr; gap: 12px; padding: 8px 0; border-top: 1px dotted var(--rule); align-items: start; }
  .cl { font-size: 11.5px; font-weight: 600; border-radius: 6px; padding: 2px 8px; white-space: nowrap; justify-self: start; }
  .cl-good { background: var(--good-bg); color: var(--good-tx); }
  .cl-bad { background: var(--bad-bg); color: var(--bad-tx); }
  .cl-warn { background: var(--warn-bg); color: var(--warn-tx); }
  .cl-neutral { background: var(--neu-bg); color: var(--neu-tx); }
  .crit .ctext { font-size: 14px; }
  .crit .just { color: var(--muted); font-size: 13px; margin-top: 3px; }
  .unavailable { color: var(--faint); font-style: italic; padding: 2px 0; }
  .empty { color: var(--faint); padding: 24px 4px; }
  details.cot { margin-top: 18px; }
  details.cot > summary { cursor: pointer; color: var(--accent); font-size: 13px; }
  details.cot pre { white-space: pre-wrap; font: 12.5px/1.5 var(--mono); color: #444; background: var(--fill);
            border: 1px solid var(--rule); border-radius: 8px; padding: 12px; max-width: 80ch; overflow-x: auto; }

  footer.band { border-top: 1px solid var(--rule); margin-top: 16px; padding: 16px 0; color: var(--faint); font: 12px/1.5 var(--mono); }
  footer.band .note { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; color: var(--muted); margin-bottom: 6px; }

  @media (max-width: 880px) {
    .report { grid-template-columns: 1fr; gap: 24px; }
    .sidebar { position: static; max-height: none; overflow: visible; }
  }
  @media print {
    .report { display: block; max-width: none; padding: 0; }
    .sidebar { position: static; top: auto; max-height: none; overflow: visible; break-after: avoid; margin-bottom: 16px; }
    .no-print { display: none !important; }
    body { font-size: 11pt; }
    details.trial, details.cot, .crit { break-inside: avoid; page-break-inside: avoid; }
    .verdict, .statuspill, .cl { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    a[href]::after { content: " (" attr(href) ")"; font-size: 9pt; color: #555; }
    @page { margin: 1.6cm; }
  }
</style>
</head>
<body>
<div class="report">
  <aside class="sidebar">
    <img class="brand-logo" src="__LOGO_SRC__" alt="TrialMatchAI">
    <div class="pcard" id="patient-card"></div>
  </aside>
  <main class="main">
    <div class="main-head"><h1>Matched clinical trials</h1></div>
    <div class="toolbar no-print">
      <div class="controls">
        <div class="search"><span class="mag" aria-hidden="true">⌕</span>
          <input id="search" type="search" placeholder="Search title, id, or condition…" aria-label="Search trials"></div>
        <select id="f-status" aria-label="Filter by status"></select>
        <select id="f-phase" aria-label="Filter by phase"></select>
        <select id="f-decision" aria-label="Filter by verdict"></select>
        <div class="seg" id="sort" role="radiogroup" aria-label="Sort order">
          <button type="button" data-sort="rank" role="radio" aria-checked="true" class="on">Best match</button>
          <button type="button" data-sort="relevance" role="radio" aria-checked="false">Text match</button>
        </div>
        <button id="toggle-all" class="ghost" type="button" aria-pressed="false">Expand all</button>
      </div>
      <div class="statusline">
        <span class="count" id="count" aria-live="polite"></span>
        <button id="clear" class="linkbtn" type="button" hidden>Clear filters</button>
      </div>
    </div>
    <div id="trial-list"></div>
    <footer class="band" id="report-footer"></footer>
  </main>
</div>

<script type="application/json" id="report-data">__REPORT_DATA__</script>
<script>
"use strict";
const DATA = JSON.parse(document.getElementById("report-data").textContent);
const TRIALS = DATA.trials || [];

function el(tag, attrs, kids) {
  const n = document.createElement(tag);
  if (attrs) for (const k in attrs) {
    if (k === "class") n.className = attrs[k];
    else if (k === "text") n.textContent = attrs[k];
    else if (attrs[k] != null) n.setAttribute(k, attrs[k]);
  }
  for (const c of (kids || [])) if (c != null) n.append(c);
  return n;
}
const chips = items => (items || []).map(c => el("span", { class: "chip", text: c }));

function verdictClass(d) {
  const s = (d || "").toLowerCase();
  if (s.startsWith("eligible")) return "v-eligible";
  if (s.includes("likely eligible")) return "v-likely-eligible";
  if (s.includes("likely ineligible")) return "v-likely-ineligible";
  if (s.startsWith("ineligible")) return "v-ineligible";
  return "v-unknown";
}
function verdictLabel(d) {
  const s = (d || "").toLowerCase();
  if (s.startsWith("eligible")) return "Eligible";
  if (s.includes("likely eligible")) return "Likely eligible";
  if (s.includes("likely ineligible")) return "Likely ineligible";
  if (s.startsWith("ineligible")) return "Ineligible";
  return "Not assessed";
}
const VGLYPH = { "v-eligible": "✓", "v-likely-eligible": "✓", "v-likely-ineligible": "△", "v-ineligible": "✕", "v-unknown": "—" };
function classKind(c) {
  const s = (c || "").toLowerCase();
  if (s === "met" || s === "not violated") return "cl-good";
  if (s === "not met" || s === "violated") return "cl-bad";
  if (s === "unclear") return "cl-warn";
  return "cl-neutral";
}
const CGLYPH = { "cl-good": "✓", "cl-bad": "✕", "cl-warn": "△", "cl-neutral": "—" };
function critCounts(t) {
  let good = 0, bad = 0, warn = 0;
  for (const it of [...(t.inclusion || []), ...(t.exclusion || [])]) {
    const k = classKind(it.classification);
    if (k === "cl-good") good++; else if (k === "cl-bad") bad++; else if (k === "cl-warn") warn++;
  }
  return { good, bad, warn };
}
function statusPill(status) {
  if (!status) return null;
  const s = status.toLowerCase();
  let glyph = "○", kind = "st-neutral";
  if (s === "recruiting" || s === "enrolling by invitation") { glyph = "●"; kind = "st-good"; }
  else if (s.startsWith("active")) { glyph = "◐"; kind = "st-warn"; }
  return el("span", { class: "statuspill " + kind, text: glyph + " " + status });
}

// --- patient sidebar ---
function renderPatientCard() {
  const p = DATA.patient || {};
  const c = document.getElementById("patient-card");
  c.append(
    el("div", { class: "pid", text: "Patient " + (p.id != null ? p.id : "—") }),
    el("div", { class: "pdem", text: (p.age != null ? "Age " + p.age + "  ·  " : "") + "Sex " + (p.sex || "—") }),
  );
  const conds = [...(p.main_conditions || []), ...(p.other_conditions || [])];
  if (conds.length) c.append(el("h2", { text: "Conditions" }), el("div", { class: "chips" }, chips(conds)));
  if (p.narrative) c.append(el("h2", { text: "Summary" }), el("p", { class: "narrative", text: p.narrative }));
}
function renderFooter() {
  const f = document.getElementById("report-footer");
  f.append(el("div", { class: "note", text: "Eligibility verdicts are AI-generated guidance, not a medical decision." }));
  f.append(el("div", { text: "Generated " + (DATA.generated_at || "") }));
}

// --- one trial ---
function kv(label, value) {
  return el("div", { class: "kv" }, [el("b", { text: label }), el("span", { text: value })]);
}
function critList(title, items) {
  if (!items || !items.length) return null;
  const rows = items.map(it => {
    const k = classKind(it.classification);
    return el("div", { class: "crit" }, [
      el("span", { class: "cl " + k, text: CGLYPH[k] + " " + (it.classification || "—") }),
      el("div", {}, [
        el("div", { class: "ctext", text: it.criterion }),
        it.justification ? el("div", { class: "just", text: it.justification }) : null,
      ]),
    ]);
  });
  return el("div", { class: "critgroup" }, [el("div", { class: "crit-h", text: title }), ...rows]);
}
function renderTrial(t) {
  const m = t.meta || {};
  const title = m.brief_title || t.trial_id;
  const sub = el("div", { class: "t-sub" }, [el("span", { class: "mono", text: t.trial_id })]);
  const tail = [m.phase, m.condition].filter(Boolean);
  if (!tail.length && !t.metadata_available) tail.push("no metadata");
  for (const v of tail) sub.append(el("span", { class: "dot", text: "·" }), document.createTextNode(v));

  const rail = el("div", { class: "rail" });
  const sp = statusPill(m.overall_status);
  if (sp) rail.append(sp);
  const vc = verdictClass(t.final_decision);
  rail.append(el("span", { class: "verdict " + vc,
    text: VGLYPH[vc] + " " + (t.reasoning_available ? verdictLabel(t.final_decision) : "Not assessed") }));

  const summary = el("summary", {}, [
    el("div", { class: "rank", text: t.rank }),
    el("div", { class: "identity" }, [el("h3", { class: "t-title", title: title, text: title }), sub]),
    rail,
  ]);

  const body = el("div", { class: "body" });
  if (t.recap) body.append(el("div", { class: "recap", text: t.recap }));
  if (t.reasoning_available) {
    const c = critCounts(t), total = c.good + c.bad + c.warn, parts = [];
    if (total) parts.push(c.good + " of " + total + " criteria met");
    if (c.warn) parts.push(c.warn + " unclear");
    if (t.reranker_score != null) parts.push("relevance " + Number(t.reranker_score).toFixed(2));
    if (parts.length) body.append(el("div", { class: "metrics", text: parts.join("  ·  ") }));
  }
  const facts = el("div", { class: "facts" });
  if (m.brief_summary) facts.append(el("p", { class: "summary-txt", text: m.brief_summary }));
  if (m.condition) facts.append(kv("Conditions", m.condition));
  if ((m.interventions || []).length) facts.append(kv("Interventions", m.interventions.join(", ")));
  if (m.study_type) facts.append(kv("Study type", m.study_type));
  if (facts.childNodes.length) body.append(facts);

  if (!t.reasoning_available) {
    body.append(el("p", { class: "unavailable", text: "Per-criterion reasoning unavailable for this trial." }));
  } else {
    const inc = critList("Inclusion criteria", t.inclusion);
    const exc = critList("Exclusion criteria", t.exclusion);
    if (inc) body.append(inc);
    if (exc) body.append(exc);
    if (t.cot) {
      const d = el("details", { class: "cot" });
      d.append(el("summary", { text: "Show full model reasoning (chain-of-thought)" }), el("pre", { text: t.cot }));
      body.append(d);
    }
  }
  const det = el("details", { class: "trial" });
  det.append(summary, body);
  return det;
}

// --- filters + pipeline ---
function fillSelect(id, values, allLabel) {
  const sel = document.getElementById(id);
  for (const v of [...new Set(values)].filter(Boolean).sort()) sel.append(el("option", { value: v, text: v }));
  sel.insertBefore(el("option", { value: "", text: allLabel }), sel.firstChild);
  sel.value = "";
}
fillSelect("f-status", TRIALS.map(t => (t.meta || {}).overall_status), "All statuses");
fillSelect("f-phase", TRIALS.map(t => (t.meta || {}).phase), "All phases");
fillSelect("f-decision", TRIALS.map(t => t.final_decision), "All verdicts");
let currentSort = "rank";

const list = document.getElementById("trial-list");
const countEl = document.getElementById("count");
function apply() {
  const q = document.getElementById("search").value.trim().toLowerCase();
  const fs = document.getElementById("f-status").value;
  const fp = document.getElementById("f-phase").value;
  const fd = document.getElementById("f-decision").value;
  let rows = TRIALS.filter(t => {
    const m = t.meta || {};
    if (fs && m.overall_status !== fs) return false;
    if (fp && m.phase !== fp) return false;
    if (fd && t.final_decision !== fd) return false;
    if (q && !(((m.brief_title || "") + " " + t.trial_id + " " + (m.condition || "")).toLowerCase().includes(q))) return false;
    return true;
  });
  rows = currentSort === "relevance"
    ? rows.slice().sort((a, b) => (b.reranker_score || 0) - (a.reranker_score || 0))
    : rows.slice().sort((a, b) => a.rank - b.rank);
  list.textContent = "";
  if (!rows.length) list.append(el("p", { class: "empty", text: "No trials match these filters." }));
  else for (const t of rows) list.append(renderTrial(t));
  const active = !!(q || fs || fp || fd);
  countEl.textContent = active ? ("Showing " + rows.length + " of " + TRIALS.length) : (TRIALS.length + " trials");
  document.getElementById("clear").hidden = !active;
}

renderPatientCard();
apply();
renderFooter();
for (const id of ["search", "f-status", "f-phase", "f-decision"])
  document.getElementById(id).addEventListener("input", apply);
document.querySelectorAll("#sort button").forEach(b => b.addEventListener("click", () => {
  currentSort = b.dataset.sort;
  document.querySelectorAll("#sort button").forEach(x => {
    const on = x === b; x.classList.toggle("on", on); x.setAttribute("aria-checked", on);
  });
  apply();
}));
const toggleAll = document.getElementById("toggle-all");
toggleAll.addEventListener("click", () => {
  const open = toggleAll.getAttribute("aria-pressed") !== "true";
  list.querySelectorAll("details.trial").forEach(d => d.open = open);
  toggleAll.setAttribute("aria-pressed", open);
  toggleAll.textContent = open ? "Collapse all" : "Expand all";
});
document.getElementById("clear").addEventListener("click", () => {
  document.getElementById("search").value = "";
  for (const id of ["f-status", "f-phase", "f-decision"]) document.getElementById(id).value = "";
  apply();
});
window.addEventListener("beforeprint", () =>
  document.querySelectorAll("details").forEach(d => { d.dataset.wasOpen = d.open ? "1" : "0"; d.open = true; }));
window.addEventListener("afterprint", () =>
  document.querySelectorAll("details").forEach(d => { if (d.dataset.wasOpen === "0") d.open = false; delete d.dataset.wasOpen; }));
</script>
</body>
</html>
